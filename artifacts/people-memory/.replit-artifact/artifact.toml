kind = "web"
previewPath = "/"
title = "People Memory Database"
version = "1.0.0"
id = "artifacts/people-memory"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 24841
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/people-memory run dev"

[services.env]
PORT = "24841"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/people-memory", "run", "build"]
publicDir = "artifacts/people-memory/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
